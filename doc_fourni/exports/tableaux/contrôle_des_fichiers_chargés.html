
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Contrôle des fichiers chargés</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #F4FAFB;
        color: #263238;
    }
    h1 {
        color: #1E7D8B;
        margin-bottom: 6px;
    }
    .meta {
        color: #607D8B;
        margin-bottom: 18px;
    }
    .toolbar {
        position: sticky;
        top: 0;
        z-index: 5;
        background: #F4FAFB;
        padding: 10px 0 14px 0;
    }
    input {
        width: min(680px, 96%);
        padding: 11px 13px;
        border: 1px solid #B7DDE4;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
    }
    input:focus {
        border-color: #33A5B6;
        box-shadow: 0 0 0 3px rgba(51,165,182,0.15);
    }
    .table-wrap {
        border: 1px solid #D9EEF2;
        background: white;
        border-radius: 10px;
        overflow: auto;
        max-height: 78vh;
        box-shadow: 0 3px 14px rgba(0,0,0,0.10);
    }
    table.bn-table {
        border-collapse: collapse;
        width: max-content;
        min-width: 100%;
        font-size: 13px;
    }
    table.bn-table thead th {
        position: sticky;
        top: 0;
        z-index: 3;
        background: #1E7D8B;
        color: white;
        text-align: left;
        padding: 10px 12px;
        border: 1px solid #D9EEF2;
        white-space: nowrap;
    }
    table.bn-table tbody td,
    table.bn-table tbody th {
        padding: 8px 12px;
        border: 1px solid #E5EEF0;
        vertical-align: top;
        white-space: nowrap;
    }
    table.bn-table tbody tr:nth-child(even) { background: #F8FBFC; }
    table.bn-table tbody tr:hover { background: #EAF9FC; }
</style>
</head>
<body>
    <h1>Contrôle des fichiers chargés</h1>
    <div class="meta">3 ligne(s) affichée(s) · 3 colonne(s)</div>
    <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Rechercher dans le tableau..." onkeyup="filterTable()">
    </div>
    <div class="table-wrap">
        <table class="dataframe bn-table">
  <thead>
    <tr style="text-align: right;">
      <th>Fichier</th>
      <th>Nombre de lignes</th>
      <th>Nombre de colonnes</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>erp.xlsx</td>
      <td>825</td>
      <td>6</td>
    </tr>
    <tr>
      <td>web.xlsx</td>
      <td>1 513</td>
      <td>29</td>
    </tr>
    <tr>
      <td>liaison.xlsx</td>
      <td>825</td>
      <td>2</td>
    </tr>
  </tbody>
</table>
    </div>
<script>
function filterTable() {
    const input = document.getElementById('searchInput');
    const filter = input.value.toLowerCase();
    const table = document.querySelector('table.bn-table');
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(filter) ? '' : 'none';
    });
}
</script>
</body>
</html>
